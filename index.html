  {

    question: 'உங்களிடம் கால்நடைகள் உள்ளனவா?'
  },

  {

    question: 'விதைப்பு முன் நிலைக்கு எத்தனை நாட்கள் தேவை?'

  },

    question: 'நடவு மற்றும் வளர்ச்சி நிலைக்கு எத்தனை நாட்கள் தேவை?'
  },

  {

    question: 'மலர்ச்சி மற்றும் கனிவளர்ச்சி நிலைக்கு எத்தனை தொழிலாளர்கள் தேவை?'
  },

  {

    question: 'மலர்ச்சி மற்றும் கனிவளர்ச்சி நிலைக்கு எத்தனை நாட்கள் தேவை?'
  },

  {

    question: 'அறுவடை நிலைக்கு எத்தனை தொழிலாளர்கள் தேவை?'
  },

    question: 'அறுவடை நிலைக்கு எத்தனை நாட்கள் தேவை?'

  {

  },

  {

    question: 'உங்கள் விளைபொருளை சந்தையில் எவ்வளவு விலையில் விற்கிறீர்கள்?'
  },

  {
    id: 'suggestions',
    question: 'உங்கள் பரிந்துரைகள் என்ன?'
  }

];

let currentQuestion = 0;
let mediaRecorder;
let audioChunks = [];
let recordings = {};
let transcripts = {};

const container = document.getElementById('questionContainer');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');

function renderQuestion() {

  const q = questions[currentQuestion];

  container.innerHTML = `

    <div class="text-center text-sm text-gray-500">
      Question ${currentQuestion + 1} / ${questions.length}
    </div>

    <!-- Question Bubble -->
    <div class="flex justify-start">
      <div class="bg-white shadow rounded-2xl p-4 w-full border">

        <p class="text-sm mb-3 text-gray-700 leading-relaxed">
          ${q.question}
        </p>

        <div class="bg-gray-100 p-3 rounded-xl text-sm text-gray-700">
  🔊 Audio will be added later
       </div>
      </div>


    </div>

    <!-- Answer Bubble -->
    <div class="flex justify-end">
      <div class="bg-[#dcf8c6] rounded-2xl p-4 w-[85%] shadow">

        <p class="text-sm mb-3 font-medium text-gray-700">
          Your Voice Answer
        </p>

        <div class="flex gap-2 flex-wrap">

          <button id="recordBtn"
            class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm">
            🎤 Hold To Record
          </button>

          <button id="deleteBtn"
            class="bg-gray-300 px-4 py-2 rounded-xl text-sm">
            🗑 Delete
          </button>

        </div>

        <div id="preview" class="mt-4"></div>

        <div
          id="liveTranscript"
          class="mt-3 text-sm text-gray-700 bg-white p-3 rounded-xl border"
        >
          🎙 Waiting for transcript...
        </div>

      </div>
    </div>
  `;

  setupRecording(q.id);
  updateButtons();
}

function setupRecording(questionId) {

  const recordBtn = document.getElementById('recordBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const preview = document.getElementById('preview');

  if (recordings[questionId]) {
    preview.innerHTML = `
      <audio controls class="w-full">
        <source src="${recordings[questionId].url}">
      </audio>
    `;
  }

  recordBtn.addEventListener('mousedown', startRecording);
  recordBtn.addEventListener('mouseup', stopRecording);

  recordBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startRecording();
  });

  recordBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    stopRecording();
  });

  deleteBtn.addEventListener('click', () => {
    delete recordings[questionId];
    delete transcripts[questionId];
    preview.innerHTML = '';
    const transcriptElement =
    document.getElementById('liveTranscript');

    if (transcriptElement) {

      transcriptElement.innerText =
        '🎙 Waiting for transcript...';

    }
  });

  async function startRecording() {

    audioChunks = [];
    transcripts[questionId] = '';

    const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

let recognition;

if (SpeechRecognition) {

  recognition = new SpeechRecognition();

  recognition.lang = 'ta-IN';

  recognition.continuous = true;

  recognition.interimResults = false;

  recognition.onresult = (event) => {

    let finalTranscript = '';

    for (
      let i = event.resultIndex;
      i < event.results.length;
      i++
    ) {

      finalTranscript +=
        event.results[i][0].transcript;

    }

    transcripts[questionId] = finalTranscript;

    const transcriptElement =
      document.getElementById('liveTranscript');

    if (transcriptElement) {

      transcriptElement.innerText =
        finalTranscript;

    }

    console.log(
      'Tamil Transcript:',
      finalTranscript
    );    

  };

  recognition.start();
}

    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true
    });

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.start();

    recordBtn.innerText = '🔴 Recording...';

    mediaRecorder.addEventListener('dataavailable', event => {
      audioChunks.push(event.data);
    });

    mediaRecorder.addEventListener('stop', () => {

      const audioBlob = new Blob(audioChunks, {
        type: 'audio/webm'
      });

      const audioUrl = URL.createObjectURL(audioBlob);

      recordings[questionId] = {
        blob: audioBlob,
        url: audioUrl,
        status: 'Pending Transcription',
        transcript: ''
      };

      preview.innerHTML = `
        <audio controls class="w-full">
          <source src="${audioUrl}">
        </audio>

        <p class="text-xs text-gray-600 mt-2">
         ✅ Recorded Successfully
        </p>

        <p class="text-sm text-gray-800 mt-2">
         ${transcripts[questionId] || 'No transcript detected'}
        </p>
      `;

      recordBtn.innerText = '🎤 Hold To Record';
    });
  }

  function stopRecording() {

  if (
    mediaRecorder &&
    mediaRecorder.state !== 'inactive'
  ) {

    mediaRecorder.stop();

  }

}
}

function updateButtons() {
  prevBtn.disabled = currentQuestion === 0;

  if (currentQuestion === questions.length - 1) {
    nextBtn.innerText = 'Submit';
  } else {
    nextBtn.innerText = 'Next';
  }
}

prevBtn.addEventListener('click', () => {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
});

nextBtn.addEventListener('click', async () => {

  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
    } else {

    const formData = new FormData();
    formData.append(
  'transcripts',
  JSON.stringify(transcripts)
);

    for (const key in recordings) {

      const recording = recordings[key];

      if (recording?.blob) {

        formData.append(
          'audioFiles',
          recording.blob,
          `${key}.webm`
        );

      }
    }

    try {

      const response = await fetch(
        'http://localhost:5000/upload',
        {
          method: 'POST',
          body: formData
        }
      );

      const result = await response.json();

      console.log(result);

      alert('Voice form submitted successfully');

    } catch (error) {

      console.error(error);

      alert('Upload failed');

    }

  }
});

function exportExcel(data) {

  const worksheet = XLSX.utils.json_to_sheet([data]);
  const workbook = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    workbook,
    worksheet,
    'FarmerData'
  );

  XLSX.writeFile(workbook, 'farmer_form.xlsx');
}

renderQuestion();

</script>
