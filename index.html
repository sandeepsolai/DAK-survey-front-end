<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Farmer Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-[#ece5dd] min-h-screen flex justify-center items-start p-4">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-[#075e54] text-white p-4 flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-lg">
        🌾
      </div>
      <div>
        <h1 class="font-bold text-lg">Farmer Voice Form</h1>
        <p class="text-xs text-white/80">Tamil Audio Survey</p>
      </div>
    </div>

    <!-- Question Container -->
    <div id="questionContainer" class="p-4 space-y-4"></div>

    <!-- Navigation -->
    <div class="p-4 border-t flex justify-between gap-3">
      <button id="prevBtn"
        class="bg-gray-200 px-4 py-2 rounded-xl font-medium w-full">
        Previous
      </button>

      <button id="nextBtn"
        class="bg-[#25d366] text-white px-4 py-2 rounded-xl font-medium w-full">
        Next
      </button>
    </div>
  </div>

<script>



const questions = [

  {
    id: 'farm_size',

    question:
      'தக்காளி பயிரிடும் மொத்த நில அளவு என்ன?',

    options: [
      '<2 acres',
      '2–5 acres',
      '5–20 acres',
      '>20 acres'
    ]
  },

  {
    id: 'season_yield',

    question:
      'ஒரு பருவத்தில் சராசரி தக்காளி விளைச்சல் எவ்வளவு?',

    options: [
      '<10 tonnes',
      '10–30 tonnes',
      '30–80 tonnes',
      '>80 tonnes'
    ]
  },

  {
    id: 'soil_preparation',

    question:
      'மண் தயார் செய்வதில் எந்த முறையை அதிகமாக பயன்படுத்துகிறீர்கள்?',

    options: [
      'Manual',
      'Tool-assisted',
      'Mechanized'
    ]
  },

  {
    id: 'fertilizer_application',

    question:
      'உரமிடும் பணியில் எந்த முறையை பயன்படுத்துகிறீர்கள்?',

    options: [
      'Manual',
      'Tool-assisted',
      'Mechanized'
    ]
  },

  {
    id: 'staking_pruning',

    question:
      'Staking & pruning பணியில் எந்த முறையை பயன்படுத்துகிறீர்கள்?',

    options: [
      'Manual',
      'Tool-assisted',
      'Mechanized'
    ]
  },

  {
    id: 'weed_management',

    question:
      'களை மேலாண்மையில் எந்த முறையை பயன்படுத்துகிறீர்கள்?',

    options: [
      'Manual',
      'Tool-assisted',
      'Mechanized'
    ]
  },

  {
    id: 'harvesting_method',

    question:
      'அறுவடை பணியில் எந்த முறையை பயன்படுத்துகிறீர்கள்?',

    options: [
      'Manual',
      'Tool-assisted',
      'Mechanized'
    ]
  },

  {
    id: 'labour_days',

    question:
      'அதிக தொழிலாளர் தேவைப்படும் காலத்தில் ஒரு ஏக்கருக்கு எத்தனை மனித-நாட்கள் தேவை?',

    options: [
      '<8',
      '8–15',
      '15–30',
      '>30'
    ]
  },

  {
    id: 'daily_wage',

    question:
      'Peak season-ல் ஒரு தொழிலாளியின் தினசரி சம்பளம் எவ்வளவு?',

    options: [
      '<₹400',
      '₹400–₹550',
      '₹550–₹700',
      '>₹700'
    ]
  },

  {
    id: 'season_labour_cost',

    question:
      'ஒரு பருவத்திற்கு மொத்த தொழிலாளர் செலவு எவ்வளவு?',

    options: [
      '<₹50,000',
      '₹50,000–₹1.5 lakh',
      '₹1.5–₹4 lakh',
      '>₹4 lakh'
    ]
  },

  {
    id: 'labour_availability',

    question:
      'Peak நேரத்தில் தொழிலாளர்கள் கிடைப்பது எப்படி?',

    options: [
      'Always sufficient',
      'Occasionally insufficient',
      'Frequently insufficient',
      'Critically scarce'
    ]
  },

  {
    id: 'machinery_usage',

    question:
      'நீங்கள் எந்த இயந்திரங்களை பயன்படுத்துகிறீர்கள்?',

    options: [
      'Tractor / power tiller',
      'Power sprayer / weeder',
      'Mechanical harvester',
      'Hired machinery only',
      'None'
    ]
  },

  {
    id: 'machinery_cost',

    question:
      'வருடத்திற்கு இயந்திர செலவு எவ்வளவு?',

    options: [
      '<₹30,000',
      '₹30,000–₹1 lakh',
      '₹1–3 lakh',
      '>₹3 lakh'
    ]
  },

  {
    id: 'selling_price',

    question:
      'தக்காளியின் சராசரி விற்பனை விலை என்ன?',

    options: [
      '<₹5/kg',
      '₹5–₹10/kg',
      '₹10–₹20/kg',
      '>₹20/kg'
    ]
  },

  {
    id: 'biggest_problem',

    question:
      'விவசாயத்தில் அதிக பாதிப்பை ஏற்படுத்தும் பிரச்சனை எது?',

    options: [
      'Labour shortage',
      'High wages',
      'Low market prices',
      'Yield loss',
      'Pest/disease outbreaks'
    ]
  }

];



let currentQuestion = 0;
let isSubmitting = false;
let mediaRecorder;
let audioChunks = [];
let answers = {};
let recordings = {};
let transcripts = {};
let recognition = null;

const container = document.getElementById('questionContainer');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');

function renderQuestion() {

  const q = questions[currentQuestion];

  container.innerHTML = `

    <div class="text-center text-sm text-gray-500">
      Question ${currentQuestion + 1} / ${questions.length}
    </div>

    <!-- Question Bubble -->
    <div class="flex justify-start">
      <div class="bg-white shadow rounded-2xl p-4 w-full border">

  

    <p class="text-sm mb-3 text-gray-700 leading-relaxed">
      ${q.question}
    </p>

    <div class="space-y-2 mt-4">

      ${q.options
        ? q.options.map(option => `

          <button
            onclick="selectAnswer('${q.id}', '${option}')"

            class="
              option-btn
              w-full
              text-left
              p-3
              rounded-xl
              border
              bg-[#f0f2f5]
              text-sm
            "

            data-question="${q.id}"
            data-option="${option}"
          >
            ${option}

          </button>

        `).join('')

        : ''

      }

    </div>



        <div class="mt-4 bg-gray-100 p-3 rounded-xl text-sm text-gray-700">
  🔊 Audio will be added later
       </div>
      </div>


    </div>

    <!-- Answer Bubble -->
    <div class="flex justify-end">
      <div class="bg-[#dcf8c6] rounded-2xl p-4 w-[85%] shadow">

        <p class="text-sm mb-3 font-medium text-gray-700">
          Optional Voice Note
        </p>

        <div class="flex gap-2 flex-wrap">

          <button id="recordBtn"
            class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm select-none touch-none">
            <div class="flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 1v11m0 0a3 3 0 003-3V5a3 3 0 10-6 0v4a3 3 0 003 3zm0 0v4m-4 0h8" />
              </svg>
              <span>Hold to Record</span>
            </div>
          </button>

          <button id="deleteBtn"
            class="bg-gray-300 px-4 py-2 rounded-xl text-sm">
            🗑 Delete
          </button>

        </div>

        <div id="preview" class="mt-4"></div>

        <div
          id="liveTranscript"
          class="mt-3 text-sm text-gray-700 bg-white p-3 rounded-xl border"
        >
          🎙 Waiting for transcript...
        </div>

      </div>
    </div>
  `;

  setupRecording(q.id);
  updateButtons();
}

function setupRecording(questionId) {

  const recordBtn = document.getElementById('recordBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const preview = document.getElementById('preview');

  if (recordings[questionId]) {
    preview.innerHTML = `
      <audio controls class="w-full">
        <source src="${recordings[questionId].url}">
      </audio>
    `;
  }

  recordBtn.addEventListener(
  'mousedown',
  () => startRecording().catch(console.error)
);
  recordBtn.addEventListener('mouseup', stopRecording);

  recordBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startRecording().catch(console.error);
  });

  recordBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    stopRecording();
  });

  deleteBtn.addEventListener('click', () => {
    delete recordings[questionId];
    delete transcripts[questionId];
    preview.innerHTML = '';
    const transcriptElement =
    document.getElementById('liveTranscript');

    if (transcriptElement) {

      transcriptElement.innerText =
        '🎙 Waiting for transcript...';

    }
  });

  async function startRecording() {

    audioChunks = [];
    transcripts[questionId] = '';

  

  const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;



if (SpeechRecognition) {

  recognition = new SpeechRecognition();

  recognition.lang = 'ta-IN';

  recognition.continuous = true;

  recognition.interimResults = false;

  recognition.onresult = (event) => {

    let finalTranscript = '';

    for (
      let i = event.resultIndex;
      i < event.results.length;
      i++
    ) {

      finalTranscript +=
        event.results[i][0].transcript;

    }

    transcripts[questionId] = finalTranscript;

    const transcriptElement =
      document.getElementById('liveTranscript');

    if (transcriptElement) {

      transcriptElement.innerText =
        finalTranscript;

    }

    console.log(
      'Tamil Transcript:',
      finalTranscript
    );    

  };

  recognition.start();
  recordBtn.dataset.recognition = 'active';
}

    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true
    });

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.start();

    recordBtn.innerHTML = `
  <div class="flex items-center gap-2">
    <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
    <span>Recording...</span>
  </div>
`;

    mediaRecorder.addEventListener('dataavailable', event => {
      audioChunks.push(event.data);
    });

    mediaRecorder.addEventListener('stop', () => {

      const audioBlob = new Blob(audioChunks, {
        type: 'audio/webm'
      });

      const audioUrl = URL.createObjectURL(audioBlob);

      recordings[questionId] = {
        blob: audioBlob,
        url: audioUrl,
        status: 'Pending Transcription',
        transcript: ''
      };

      preview.innerHTML = `
        <audio controls class="w-full">
          <source src="${audioUrl}">
        </audio>

        <p class="text-xs text-gray-600 mt-2">
         ✅ Recorded Successfully
        </p>

        <p class="text-sm text-gray-800 mt-2">
         ${transcripts[questionId] || 'No transcript detected'}
        </p>
      `;

      recordBtn.innerHTML = `
  <div class="flex items-center gap-2">

    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="w-5 h-5"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 1v11m0 0a3 3 0 003-3V5a3 3 0 10-6 0v4a3 3 0 003 3zm0 0v4m-4 0h8"
      />
    </svg>

    <span>Hold to Record</span>

  </div>
`;
    });
  }

function stopRecording() {

  if (
    mediaRecorder &&
    mediaRecorder.state !== 'inactive'
  ) {

    mediaRecorder.stop();

  }

  if (
    recognition
  ) {

    try {

      recognition.stop();

    } catch (err) {

      console.log(err);

    }

  }

}
}

function updateButtons() {
  prevBtn.disabled = currentQuestion === 0;

  if (currentQuestion === questions.length - 1) {
    nextBtn.innerText = 'Submit';
  } else {
    nextBtn.innerText = 'Next';
  }
}

function selectAnswer(questionId, answer) {

  answers[questionId] = answer;

  console.log(answers);

  const buttons =
    document.querySelectorAll(
      `[data-question="${questionId}"]`
    );

  buttons.forEach(btn => {

    btn.classList.remove(
      'bg-[#d9fdd3]',
      'border-green-500'
    );

  });

  const selected =
    document.querySelector(
      `[data-question="${questionId}"][data-option="${answer}"]`
    );

  if (selected) {

    selected.classList.add(
      'bg-[#d9fdd3]',
      'border-green-500'
    );

  }

}


prevBtn.addEventListener('click', () => {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
});

nextBtn.addEventListener('click', async () => {

  if (isSubmitting) return;

  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
    } else {

    isSubmitting = true;

    nextBtn.disabled = true;

    nextBtn.innerHTML = `
      <div class="flex items-center justify-center gap-2">
        <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        Submitting...
      </div>
    `;

    const formData = new FormData();
    formData.append(
  'answers',
  JSON.stringify(answers)
);
    formData.append(
  'transcripts',
  JSON.stringify(transcripts)
);

    for (const key in recordings) {

      const recording = recordings[key];

      if (recording?.blob) {

        formData.append(
          'audioFiles',
          recording.blob,
          `${key}.webm`
        );

      }
    }

    try {

      const response = await fetch(
        'https://dak-survey-api.onrender.com/upload',
        {
          method: 'POST',
          body: formData
        }
      );

      const result = await response.json();

      console.log(result);

      document.body.innerHTML = `
        <div class="min-h-screen bg-[#ece5dd] flex items-center justify-center p-6">
          <div class="bg-white rounded-3xl shadow-2xl p-8 text-center max-w-md w-full">
            <div class="text-6xl mb-4">✅</div>
            <h1 class="text-2xl font-bold text-[#075e54] mb-3">Survey Submitted</h1>
            <p class="text-gray-600">Thank you for participating in the survey.</p>
          </div>
        </div>
      `;

    } catch (error) {

      console.error(error);

      isSubmitting = false;
      nextBtn.disabled = false;
      nextBtn.innerText = 'Submit';
      alert('Upload failed');

    }

  }
});

function exportExcel(data) {

  const worksheet = XLSX.utils.json_to_sheet([data]);
  const workbook = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    workbook,
    worksheet,
    'FarmerData'
  );

  XLSX.writeFile(workbook, 'farmer_form.xlsx');
}

renderQuestion();

</script>

</body>
</html>
